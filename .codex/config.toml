mcp_servers.nx-mcp.args    = ['nx', 'mcp', '--minimal']
mcp_servers.nx-mcp.command = 'npx'

[features]
multi_agent = true

[agents.ci-monitor-subagent]
config_file = 'agents/ci-monitor-subagent.toml'
